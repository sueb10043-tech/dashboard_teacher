<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 운영 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Gowun+Dodum:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 폰트 및 렌더링 최적화 */
        * { -webkit-font-smoothing: subpixel-antialiased; text-rendering: geometricPrecision; box-sizing: border-box; }
        body { font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif; margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #d8eeff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* [수정] 상단 여백을 46px에서 40px로 조정 */
        #app-scaler { 
            width: 1920px; height: 1080px; flex-shrink: 0; position: absolute; left: 50%; top: 50%; 
            transform: translate(-50%, -50%); transform-origin: center center; 
            display: flex; flex-direction: column; padding: 40px 60px; background-color: #d8eeff; 
        }

        .window-frame { 
            background: white; border-radius: 0.75rem; box-shadow: 0 6px 20px rgba(0,0,0,0.06); 
            display: flex; flex-direction: column; border: 1px solid #e5e7eb; position: relative;
        }
        .window-header { 
            background: #f3f4f6; padding: 10px 18px; display: flex; gap: 8px; 
            border-bottom: 1px solid #e5e7eb; height: 32px; flex-shrink: 0; align-items: center; 
            border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem;
        }
        .browser-header { 
            background: #f3f4f6; padding: 6px 16px; display: flex; align-items: center; gap: 12px; 
            border-bottom: 1px solid #e5e7eb; border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem;
        }

        .dot-gray { width: 10px; height: 10px; border-radius: 50%; background: #d1d5db; }
        .address-bar-container { background: white; flex-grow: 1; height: 32px; border-radius: 16px; border: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 10px; gap: 8px; }
        #blackboard-input { width: 100%; height: 100%; padding: 20px; border: none; outline: none; overflow-y: auto; line-height: 1.6; font-weight: bold; white-space: pre-wrap; word-break: break-all; }
        #blackboard-confirm { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; border-radius: 0.75rem; }

        .schedule-window-width { width: 450px; flex-shrink: 0; }
        .schedule-item { 
            display: grid; 
            grid-template-columns: 180px 1fr; 
            align-items: center; 
            padding: 10px 15px 10px 13px; 
            border-bottom: 1px solid #f3f4f6; 
            font-size: 35px; 
            font-weight: 500; 
            height: 90px; 
            box-sizing: border-box; 
            position: relative; 
        }
        .schedule-label { color: #0891b2; font-weight: 700; text-align: center; }
        .schedule-time { padding-left: 14px; font-family: 'Public Sans', sans-serif; font-weight: 400; color: #6b7280; white-space: nowrap; }
        .active-period { background-color: #fff9db !important; }
        
        #break-indicator { 
            position: absolute; 
            left: 0; 
            width: 100%; 
            height: 4px; 
            background-color: #f59e0b; 
            display: none; 
            align-items: center; 
            z-index: 50; 
            pointer-events: none;
        }
        #break-indicator::before { 
            content: '▶'; 
            position: absolute; 
            left: -18px; 
            color: #f59e0b; 
            font-size: 1.8rem; 
            top: 50%;
            transform: translateY(-50%);
            animation: arrowBlink 0.8s infinite; 
        }
        @keyframes arrowBlink { 0%, 100% { opacity: 1; transform: translateY(-50%) translateX(0); } 50% { opacity: 0.7; transform: translateY(-50%) translateX(4px); } }

        .date-weather-window-width { width: 780px; height: 200px; flex-shrink: 0; } 
        .blank-window-width { width: 374px; height: 200px; flex-shrink: 0; } 
        .clock-window-width { width: 550px; height: 200px; flex-shrink: 0; }
        #display-time { font-family: 'Public Sans', sans-serif; letter-spacing: -0.02em; }

        .dock-container { position: absolute; bottom: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .dock-bar { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); border-radius: 1.5rem; padding: 10px 22px; display: flex; gap: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.5); pointer-events: auto; }
        .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.2s; }
        .app-icon-wrapper:hover { transform: translateY(-6px); }
        .app-icon-box { width: 52px; height: 52px; border-radius: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.08); position: relative; }
        .app-label { font-size: 9px; font-weight: 700; color: #64748b; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { 
            background: white; padding: 50px 60px; border-radius: 40px; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.2); text-align: center;
            width: 900px; height: 600px; display: flex; flex-direction: column; align-items: center;
        }

        #blackout-overlay { position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; background: black; display: none; z-index: 2000; }
        .blackout-unlock-btn { position: absolute; bottom: 110px; right: 40px; opacity: 0.2; cursor: pointer; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; }
        .blackout-unlock-btn:hover { opacity: 0.6; }

        .finished-msg { 
            font-family: 'Gowun Dodum', sans-serif; 
            font-weight: 700; 
            color: #2563eb; 
            font-size: 70px !important; 
            line-height: 1.2; 
            animation: fadeIn 0.5s ease-out; 
            margin-top: 10px;
            margin-bottom: 40px !important; 
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; opacity: 1; transform: translateY(0); } }

        .btn-clear-all { 
            margin-left: auto; 
            cursor: pointer; 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            background: #fee2e2; 
            transition: background 0.2s;
        }
        .btn-clear-all svg { width: 12px; height: 12px; stroke: #ef4444; stroke-width: 3.5; stroke-linecap: round; }

        #font-size-input { background: #f8fafc; border: none; outline: none; width: 50px; height: 22px; border-radius: 4px; text-align: center; font-size: 12px; font-weight: 800; color: #64748b; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }

        .bg-app-blue { background: linear-gradient(145deg, #e0f2fe, #bae6fd); }
        .bg-app-green { background: linear-gradient(145deg, #f0fdf4, #dcfce7); }
        .bg-app-yellow { background: linear-gradient(145deg, #fffbeb, #fef3c7); }
        .bg-app-purple { background: linear-gradient(145deg, #faf5ff, #f3e8ff); }
        .bg-app-gray { background: linear-gradient(145deg, #f9fafb, #f3f4f6); }
        .bg-app-red { background: linear-gradient(145deg, #fff1f2, #ffe4e6); }
    </style>
</head>
<body>

    <div id="app-scaler">
        <div id="blackout-overlay">
            <div class="blackout-unlock-btn" onclick="toggleBlackout()">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.77.04"/>
                </svg>
            </div>
        </div>

        <div id="timer-modal" class="modal-overlay" onclick="closeAppModals(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h2 id="timer-title" class="text-4xl font-bold mb-8 text-gray-400 uppercase tracking-widest">정리시간</h2>
                <div id="cleanup-display-area" style="height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <div id="cleanup-display" class="text-[180px] font-black text-blue-600 leading-none">02:00</div>
                </div>
                
                <div id="status-bar-area" class="w-full bg-gray-100 h-10 rounded-full relative mb-12 overflow-visible px-4">
                    <div id="goal-target" class="absolute -left-4 -top-16 w-20 h-20">
                        <svg viewBox="0 0 100 100">
                            <path d="M0 40 Q 20 20, 40 40 L 25 90 Q 20 95, 15 90 Z" fill="#fb923c" />
                            <path d="M15 40 Q 20 10, 35 20 M 15 40 Q 10 5, 0 15 M 15 40 Q 5 15, -10 25" stroke="#4ade80" stroke-width="6" fill="none" stroke-linecap="round"/>
                            <path d="M10 55 H 30 M 12 70 H 25 M 15 80 H 20" stroke="#ea580c" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                        </svg>
                    </div>
                    <div id="cleanup-bar" class="h-full rounded-full bg-blue-500 transition-all duration-1000 relative" style="width: 100%;">
                        <span id="runner-icon" class="absolute -right-10 -top-16 text-7xl">🐰</span>
                    </div>
                </div>

                <div class="flex gap-12 justify-center">
                    <button id="timer-ctrl-btn" onclick="toggleCleanupTimer()" class="w-24 h-24 rounded-3xl bg-blue-500 text-white flex items-center justify-center shadow-xl"><svg id="ctrl-icon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                    <button onclick="resetCleanupTimer()" class="w-24 h-24 rounded-3xl bg-gray-100 text-gray-500 flex items-center justify-center shadow-md"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                </div>
            </div>
        </div>

        <header class="flex gap-12 items-start mb-[50px]">
            <div class="window-frame date-weather-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex items-center justify-center px-10">
                    <div id="display-date" class="text-[80px] font-bold whitespace-nowrap"></div>
                    <span id="weather-icon" class="text-[90px] ml-5">🌤️</span>
                </div>
            </div>
            <div class="window-frame blank-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex flex-col items-center justify-center px-[10px] py-5 text-center overflow-hidden">
                    <div id="emotion-word-container" class="w-full flex justify-center mb-3">
                        <div id="emotion-word" class="font-black text-cyan-700 leading-none whitespace-nowrap" style="font-size: 60px;">로딩 중</div>
                    </div>
                    <div id="emotion-desc-container" class="w-full flex items-center justify-center">
                        <div id="emotion-desc" class="font-bold text-gray-500 leading-snug break-keep" style="font-size: 30px;">데이터를 불러오는 중입니다.</div>
                    </div>
                </div>
            </div>
            <div class="window-frame clock-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex items-center justify-center relative">
                    <div class="relative flex items-center justify-center">
                        <div id="display-time" class="text-[125px] font-black leading-none">00:00</div>
                        <div id="display-ampm" class="absolute left-full ml-4 bottom-2 text-[25px] font-bold text-gray-500 whitespace-nowrap">--</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex gap-12 items-start"> 
            <div class="window-frame flex-grow" style="height: 597px;">
                <div class="browser-header">
                    <div class="flex gap-2 items-center">
                        <div class="color-dot w-4 h-4 rounded-full bg-red-500 cursor-pointer" onclick="setChalkColor('#ef4444')"></div>
                        <div class="color-dot w-4 h-4 rounded-full bg-blue-500 cursor-pointer" onclick="setChalkColor('#3b82f6')"></div>
                        <div class="color-dot w-4 h-4 rounded-full bg-gray-800 cursor-pointer" onclick="setChalkColor('#333')"></div>
                    </div>
                    <div class="address-bar-container">
                        <input type="text" id="font-size-input" value="70px" onchange="updateChalkStyle()">
                        <div class="btn-clear-all" onclick="showBlackboardConfirm()">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </div>
                    </div>
                </div>
                <div id="blackboard-confirm">
                    <p class="text-xl font-bold mb-4 text-gray-700">칠판의 모든 내용을 삭제할까요?</p>
                    <div class="flex gap-3">
                        <button onclick="executeClear()" class="bg-red-500 text-white px-5 py-2 rounded-lg font-bold">삭제</button>
                        <button onclick="hideBlackboardConfirm()" class="bg-gray-200 px-5 py-2 rounded-lg font-bold text-gray-600">취소</button>
                    </div>
                </div>
                <div id="blackboard-input" contenteditable="true" spellcheck="false" class="flex-grow bg-white" style="color: #333; font-size: 70px;" oninput="onBlackboardInput()"></div>
            </div>

            <div class="window-frame schedule-window-width" style="height: fit-content; overflow: visible;">
                <div class="window-header flex justify-between items-center pr-4"><div class="flex gap-2"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div></div>
                <div id="schedule-list" style="padding-bottom: 25px; position: relative;">
                    <div id="break-indicator"></div>
                </div>
            </div>
        </main>

        <div class="dock-container">
            <div class="dock-bar">
                <div class="app-icon-wrapper" onclick="openApp('timer')"><div class="app-icon-box bg-app-blue"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="app-label">정리시간</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/dice/?v=3.3.8&loc=other', 750, 425, 'diceWin')"><div class="app-icon-box bg-app-green"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="8.5" cy="8.5" r="1.5"/><circle cx="15.5" cy="15.5" r="1.5"/><circle cx="15.5" cy="8.5" r="1.5"/><circle cx="8.5" cy="15.5" r="1.5"/><circle cx="12" cy="12" r="1.5"/></svg></div><span class="app-label">주사위</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/timer/?loc=other', 1500, 850, 'timerWin')"><div class="app-icon-box bg-app-yellow"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2.5"><path d="M5 22h14M5 2h14M17 22c0-3.1-2-6-5-6s-5 2.9-5 6M17 2c0 3.1-2 6-5 6s-5-2.9-5-6M12 10.5v3"/></svg></div><span class="app-label">타이머</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/marble/?v=3.3.8&loc=other', 1500, 850, 'marbleWin')"><div class="app-icon-box bg-app-purple"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div><span class="app-label">랜덤레이스</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/randombox/?v=3.3.8&loc=other', 1500, 850, 'randomWin')"><div class="app-icon-box bg-app-gray"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div><span class="app-label">랜덤 뽑기</span></div>
                <div class="app-icon-wrapper" onclick="toggleBlackout()"><div class="app-icon-box bg-app-red"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#be123c" stroke-width="2.5"><path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.77.04"/></svg></div><span class="app-label">블랙 아웃</span></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCgmF_cfpNOaImXQ7yY0UPOZ5eDuH1whp7NKTdEAvjPWGO6y5GzvafqySyy3Oul1l/exec";
        let cleanupInterval, cleanupSeconds = 120, isTimerRunning = false, blackboardSaveTimeout;
        let lastCheckedDate = new Date().toISOString().split('T')[0];

        function adjustScale() { const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080); document.getElementById('app-scaler').style.transform = `translate(-50%, -50%) scale(${scale})`; }
        window.addEventListener('resize', adjustScale);

        function updateClock() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            if (lastCheckedDate !== todayStr) { lastCheckedDate = todayStr; fetchEmotionData(); }
            const h = now.getHours() % 12 || 12;
            document.getElementById('display-date').innerHTML = `<span class="text-cyan-600">${now.getMonth() + 1}</span>월 <span class="text-cyan-600">${now.getDate()}</span>일 <span class="text-cyan-600">${["일","월","화","수","목","금","토"][now.getDay()]}</span>요일`;
            document.getElementById('display-time').textContent = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('display-ampm').textContent = now.getHours() >= 12 ? '오후' : '오전';
            updateScheduleHighlight();
        }

        async function fetchEmotionData() {
            try {
                const [dataRes, stateRes] = await Promise.all([ fetch(`${GAS_URL}?sheet=학생용_바탕화면&range=B5:C84`), fetch(`${GAS_URL}?sheet=학생용_바탕화면&range=F1`) ]);
                const emotions = await dataRes.json();
                let stateRaw = await stateRes.json(), state;
                const today = new Date(); today.setHours(0,0,0,0);
                try { state = (typeof stateRaw === 'object' && stateRaw.data) ? JSON.parse(stateRaw.data) : JSON.parse(stateRaw); } catch(e) { state = null; }

                if (!state || !state.sequence || !state.startDate) {
                    const seq = Array.from({length: 80}, (_, i) => i);
                    for (let i = seq.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [seq[i], seq[j]] = [seq[j], seq[i]]; }
                    state = { sequence: seq, startDate: today.toISOString().split('T')[0] };
                    await fetch(`${GAS_URL}?sheet=학생용_바탕화면`, { method: 'POST', body: JSON.stringify({ data: JSON.stringify(state), range: "F1" }) });
                }
                const start = new Date(state.startDate);
                const diffTime = Math.abs(today - start);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const emotionIdx = state.sequence[diffDays % 80];
                const selected = emotions[emotionIdx];
                const wEl = document.getElementById('emotion-word'), dEl = document.getElementById('emotion-desc');
                wEl.textContent = selected[0] || "반가워"; dEl.textContent = selected[1] || "";
                setTimeout(() => {
                    let ws = 60; wEl.style.fontSize = ws + 'px'; while (wEl.scrollWidth > 350 && ws > 25) { ws -= 2; wEl.style.fontSize = ws + 'px'; }
                    let ds = 30; dEl.style.fontSize = ds + 'px'; while (dEl.scrollHeight > 85 && ds > 18) { ds -= 1; dEl.style.fontSize = ds + 'px'; }
                }, 50);
            } catch (e) { }
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.195&longitude=128.093&current_weather=true`);
                const data = await res.json(), code = data.current_weather.weathercode;
                const map = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 61: "🌧️", 71: "❄️", 95: "⚡" };
                document.getElementById('weather-icon').textContent = map[code] || "🌤️";
            } catch (e) {}
        }

        async function loadBlackboard() {
            try {
                const res = await fetch(`${GAS_URL}?sheet=학생용_바탕화면&range=E1`);
                const raw = await res.json();
                const content = (typeof raw === 'object' && raw !== null && raw.data) ? raw.data : raw;
                if (content && typeof content === 'string' && content !== "{}" && content !== "[object Object]") document.getElementById('blackboard-input').innerHTML = content;
            } catch (e) {}
        }

        function onBlackboardInput() { clearTimeout(blackboardSaveTimeout); blackboardSaveTimeout = setTimeout(saveBlackboard, 1000); }
        async function saveBlackboard() {
            const content = document.getElementById('blackboard-input').innerHTML;
            if (content === "[object Object]") return;
            try { await fetch(`${GAS_URL}?sheet=학생용_바탕화면`, { method: 'POST', body: JSON.stringify({ data: content, range: "E1" }) }); } catch (e) {}
        }

        function showBlackboardConfirm() { document.getElementById('blackboard-confirm').style.display = 'flex'; }
        function hideBlackboardConfirm() { document.getElementById('blackboard-confirm').style.display = 'none'; }
        function executeClear() { document.getElementById('blackboard-input').innerHTML = ""; saveBlackboard(); hideBlackboardConfirm(); }
        function setChalkColor(c) { document.getElementById('blackboard-input').style.color = c; saveBlackboard(); }
        function updateChalkStyle() { 
            let size = document.getElementById('font-size-input').value; if(!isNaN(size) && size !== "") size = size + 'px';
            document.getElementById('blackboard-input').style.fontSize = size; saveBlackboard();
        }

        function toggleCleanupTimer() {
            const icon = document.getElementById('ctrl-icon');
            if (isTimerRunning) { clearInterval(cleanupInterval); icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; isTimerRunning = false;
            } else { cleanupInterval = setInterval(updateCleanupTimer, 1000); icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; isTimerRunning = true; }
        }

        function updateCleanupTimer() {
            if (cleanupSeconds <= 0) { 
                clearInterval(cleanupInterval); document.getElementById('timer-title').style.visibility = 'hidden';
                const d = document.getElementById('cleanup-display'); 
                d.innerHTML = "자리에 예쁘게 앉아<br>책을 펴요."; d.className = "finished-msg px-12"; 
                document.getElementById('goal-target').style.display = 'none';
                document.getElementById('cleanup-bar').style.width = '0%'; isTimerRunning = false; return;
            }
            cleanupSeconds--; const m = Math.floor(cleanupSeconds / 60), s = cleanupSeconds % 60;
            document.getElementById('cleanup-display').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            document.getElementById('cleanup-bar').style.width = `${(cleanupSeconds / 120) * 100}%`;
        }

        function resetCleanupTimer() {
            clearInterval(cleanupInterval); cleanupSeconds = 120; isTimerRunning = false; document.getElementById('timer-title').style.visibility = 'visible';
            const d = document.getElementById('cleanup-display'); d.textContent = "02:00"; d.className = "text-[180px] font-black text-blue-600 leading-none";
            document.getElementById('cleanup-bar').style.width = '100%'; document.getElementById('goal-target').style.display = 'block'; document.getElementById('ctrl-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        }

        function openPopup(url, w, h, winName) { const l = (screen.width - w) / 2, t = (screen.height - h) / 2; window.open(url, winName, `width=${w},height=${h},left=${l},top=${t},popup=yes,resizable=yes,scrollbars=yes,status=no,location=no`); }

        function updateScheduleHighlight() {
            const now = new Date(), curMin = now.getHours() * 60 + now.getMinutes();
            const items = document.querySelectorAll('.schedule-item'), ind = document.getElementById('break-indicator');
            let anyActive = false, breakIdx = -1;
            items.forEach((item, idx) => {
                const txt = item.querySelector('.schedule-time')?.textContent;
                if (!txt) return;
                const match = txt.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                if (match) {
                    let sH = parseInt(match[1]); if (sH < 8) sH += 12; const sM = sH * 60 + parseInt(match[2]);
                    let eH = parseInt(match[3]); if (eH < 8) eH += 12; const eM = eH * 60 + parseInt(match[4]);
                    if (curMin >= sM && curMin < eM) { item.classList.add('active-period'); anyActive = true; } else { item.classList.remove('active-period'); }
                    if (idx < items.length - 1) {
                        const nTxt = items[idx+1].querySelector('.schedule-time')?.textContent;
                        if (nTxt) {
                            const nMatch = nTxt.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                            if (nMatch) {
                                let nsH = parseInt(nMatch[1]); if (nsH < 8) nsH += 12; const nsM = nsH * 60 + parseInt(nMatch[2]);
                                if (curMin >= eM && curMin < nsM) breakIdx = idx + 1;
                            }
                        }
                    }
                }
            });
            if (breakIdx !== -1 && !anyActive) { ind.style.display = 'flex'; ind.style.top = (90 * breakIdx) + 'px'; } else { ind.style.display = 'none'; }
        }

        async function fetchSchedule() {
            try {
                const res = await fetch(`${GAS_URL}?sheet=학생용_바탕화면`);
                const data = await res.json(), day = ["일","월","화","수","목","금","토"][new Date().getDay()];
                const list = document.getElementById('schedule-list'), ind = document.getElementById('break-indicator');
                list.innerHTML = ''; list.appendChild(ind);
                const items = data[day] || ["1교시 09:00-09:40", "2교시 09:50-10:30", "3교시 10:40-11:20", "4교시 11:30-12:10", "점심시간 12:10-13:10", "5교시 13:10-13:50"];
                items.forEach(it => {
                    const div = document.createElement('div'); div.className = 'schedule-item';
                    const parts = it.split(' ');
                    div.innerHTML = `<span class="schedule-label">${parts[0]}</span><span class="schedule-time">${parts[1]}</span>`;
                    list.appendChild(div);
                });
                updateScheduleHighlight();
            } catch (e) {}
        }

        function openApp(id) { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); document.getElementById(`${id}-modal`).style.display = 'flex'; }
        function closeAppModals(e) { if (e.target.classList.contains('modal-overlay')) { e.target.style.display = 'none'; if (e.target.id === 'timer-modal') resetCleanupTimer(); } }
        function toggleBlackout() { const el = document.getElementById('blackout-overlay'); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }

        window.onload = () => { adjustScale(); updateClock(); setInterval(updateClock, 1000); fetchWeather(); fetchEmotionData(); fetchSchedule(); loadBlackboard(); };
    </script>
</body>
</html>
